<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Meetup</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#F7F3EC;
  color:#1A1612;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:3rem;
}

.timer{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.unit{
  font-size:2rem;
}
</style>
</head>

<body>

<div>
  <h1>Next Meetup</h1>
  <div id="date"></div>

  <div class="timer">
    <div class="unit"><span id="d">00</span><br>Days</div>
    <div class="unit"><span id="h">00</span><br>Hours</div>
    <div class="unit"><span id="m">00</span><br>Min</div>
    <div class="unit"><span id="s">00</span><br>Sec</div>
  </div>
</div>

<script>
const TARGET = new Date('2026-05-03T21:00:00').getTime();

function pad(n){return String(n).padStart(2,'0')}

function update(){
  const diff = TARGET - Date.now();

  if(diff <= 0){
    document.body.innerHTML = "<h1>It's time!</h1>";
    return;
  }

  const ts = Math.floor(diff/1000);

  document.getElementById('d').textContent = pad(Math.floor(ts/86400));
  document.getElementById('h').textContent = pad(Math.floor((ts%86400)/3600));
  document.getElementById('m').textContent = pad(Math.floor((ts%3600)/60));
  document.getElementById('s').textContent = pad(ts%60);

  document.getElementById('date').textContent =
    new Date(TARGET).toLocaleString();
}

setInterval(update,1000);
update();
</script>

</body>
</html>
